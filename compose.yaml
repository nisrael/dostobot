# compose.yaml – DoStoBot with Traefik reverse proxy + authentik forwardauth
#
# Prerequisites:
#   - A running Traefik instance on the `proxy-net` Docker network with a
#     `websecure` entrypoint and a configured certificate resolver.
#   - A running authentik instance with a Proxy Provider configured in
#     "Forward auth (single application)" mode pointing at your DoStoBot domain.
#     The authentik forwardAuth middleware definition belongs in authentik's own
#     compose file or in your Traefik static/dynamic configuration — not here.
#     See: https://goauthentik.io/docs/providers/proxy/forwardauth/
#
# Quick start:
#   1. Copy .env.example to .env and set PUBLIC_HOST (and MUSIC_DIR if needed)
#   2. docker compose up -d

services:
  dostobot:
    image: ghcr.io/nisrael/dostobot:latest
    container_name: dostobot
    restart: unless-stopped

    environment:
      PORT: "8080"
      LIBRARY_DIR: /music
      DOWNLOAD_DIR: /downloads
      DATA_DIR: /data

    volumes:
      # Your existing music library (adjust the host path)
      - "${MUSIC_DIR:-./music}:/music"
      # Persistent queue state
      - dostobot_data:/data
      # Temporary download area
      - dostobot_downloads:/downloads

    networks:
      - proxy-net

    labels:
      - "traefik.enable=true"
      # ── Router – HTTPS (Traefik does TLS termination) ─────────────────────────
      - "traefik.http.routers.dostobot.rule=Host(`${PUBLIC_HOST:-dostobot.localhost}`)"
      - "traefik.http.routers.dostobot.entrypoints=websecure"
      - "traefik.http.routers.dostobot.tls=true"
      - "traefik.http.routers.dostobot.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      # Apply the authentik middleware to every request (except /health).
      # The middleware itself must be defined in authentik's compose file or
      # in your Traefik configuration — reference it here by name only.
      - "traefik.http.routers.dostobot.middlewares=authentik@docker"
      # ── Optional HTTP→HTTPS redirect ──────────────────────────────────────────
      - "traefik.http.routers.dostobot-http.rule=Host(`${PUBLIC_HOST:-dostobot.localhost}`)"
      - "traefik.http.routers.dostobot-http.entrypoints=web"
      - "traefik.http.routers.dostobot-http.middlewares=dostobot-redirect"
      - "traefik.http.middlewares.dostobot-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.dostobot-redirect.redirectscheme.permanent=true"
      # ── Service ───────────────────────────────────────────────────────────────
      - "traefik.http.services.dostobot.loadbalancer.server.port=8080"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  dostobot_data:
  dostobot_downloads:

networks:
  proxy-net:
    external: true
